<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e8e0d4;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      max-width: 640px;
      padding: 2rem;
      text-align: center;
      position: relative;
    }

    .name-flipper {
      height: 3.4rem;
      overflow: hidden;
      position: relative;
      margin-bottom: 2.4rem;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .name-flipper.visible {
      opacity: 1;
    }

    .name-track {
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .name-item {
      height: 3.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: 400;
      font-style: italic;
      color: #f5ebe0;
      letter-spacing: 0.03em;
    }

    .line {
      font-size: 1.5rem;
      font-weight: 300;
      line-height: 1.8;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      min-height: 2.7rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .line.visible {
      opacity: 1;
    }

    .line.question {
      font-size: 2rem;
      font-weight: 400;
      font-style: italic;
      margin-top: 1.2rem;
      color: #f5ebe0;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #e8e0d4;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s ease-in-out infinite;
    }

    .question .cursor {
      height: 1.3em;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .response-section {
      margin-top: 2.8rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .response-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .yes-btn {
      display: inline-block;
      padding: 0.8rem 3rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: #e8e0d4;
      background: transparent;
      border: 1px solid rgba(232, 224, 212, 0.3);
      border-radius: 0;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .yes-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(232, 224, 212, 0.08);
      transition: left 0.4s ease;
    }

    .yes-btn:hover {
      border-color: rgba(232, 224, 212, 0.6);
      box-shadow: 0 0 30px rgba(232, 224, 212, 0.06);
    }

    .yes-btn:hover::before {
      left: 0;
    }

    .confirmation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 10;
    }

    .confirmation.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .confirmation-text {
      font-size: 1.8rem;
      font-weight: 300;
      line-height: 2;
      color: #f5ebe0;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
    }

    .confirmation.visible .confirmation-text {
      opacity: 1;
      transform: translateY(0);
    }

    .ambient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .ambient-dot {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(232, 224, 212, 0.15);
      border-radius: 50%;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    @media (max-width: 600px) {
      .name-item { font-size: 2rem; }
      .name-flipper { height: 2.8rem; }
      .name-item { height: 2.8rem; }
      .line { font-size: 1.2rem; }
      .line.question { font-size: 1.5rem; }
      .container { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="ambient" id="ambient"></div>

  <div class="container">
    <div class="name-flipper" id="flipper">
      <div class="name-track" id="track">
        <div class="name-item">Maithangi</div>
        <div class="name-item">Rohini</div>
        <div class="name-item">Nandini</div>
        <div class="name-item">Kanakavalli</div>
        <div class="name-item">Sandhya</div>
        <div class="name-item">Sandhya Portland</div>
      </div>
    </div>

    <div class="line" id="line-0"></div>
    <div class="line" id="line-1"></div>
    <div class="line" id="line-2"></div>
    <div class="line question" id="line-3"></div>

    <div class="response-section" id="response">
      <button class="yes-btn" id="yes-btn">i'd love that</button>
    </div>
  </div>

  <div class="confirmation" id="confirmation">
    <div class="confirmation-text" id="confirmation-text"></div>
  </div>

  <script>
    const names = ['Maithangi', 'Rohini', 'Nandini', 'Kanakavalli', 'Sandhya', 'Sandhya Portland'];
    const track = document.getElementById('track');
    const flipper = document.getElementById('flipper');
    const itemHeight = document.querySelector('.name-item').offsetHeight;
    let currentIndex = 0;
    let flipInterval;

    function flipName() {
      currentIndex = (currentIndex + 1) % names.length;
      track.style.transform = `translateY(-${currentIndex * itemHeight}px)`;
    }

    function startFlipping() {
      flipper.classList.add('visible');
      flipInterval = setInterval(flipName, 700);
    }

    const lines = [
      { id: 'line-0', text: 'I had a really great time today.', delay: 600 },
      { id: 'line-1', text: "And I can't stop thinking about it.", delay: 1000 },
      { id: 'line-2', text: 'So I just have one question...', delay: 1600 },
      { id: 'line-3', text: 'Wanna see where this goes?', delay: 2000 },
    ];

    const CHAR_SPEED = 50;

    function typeText(el, text) {
      return new Promise(resolve => {
        el.classList.add('visible');
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'cursor';

        function tick() {
          el.textContent = text.slice(0, i);
          el.appendChild(cursor);
          if (i < text.length) {
            i++;
            setTimeout(tick, CHAR_SPEED);
          } else {
            resolve();
          }
        }

        tick();
      });
    }

    function removeCursor(el) {
      const c = el.querySelector('.cursor');
      if (c) c.remove();
    }

    async function runSequence() {
      await new Promise(r => setTimeout(r, 400));
      startFlipping();

      for (let i = 0; i < lines.length; i++) {
        const { id, text, delay } = lines[i];
        const el = document.getElementById(id);
        await new Promise(r => setTimeout(r, delay));
        await typeText(el, text);

        if (i < lines.length - 1) {
          await new Promise(r => setTimeout(r, 300));
          removeCursor(el);
        }
      }

      await new Promise(r => setTimeout(r, 900));
      document.getElementById('response').classList.add('visible');
    }

    document.getElementById('yes-btn').addEventListener('click', () => {
      const confirmation = document.getElementById('confirmation');
      const text = document.getElementById('confirmation-text');
      text.innerHTML = "Then it's a date, Sandhya Portland.";
      confirmation.classList.add('visible');
    });

    function createAmbient() {
      const container = document.getElementById('ambient');
      for (let i = 0; i < 25; i++) {
        const dot = document.createElement('div');
        dot.className = 'ambient-dot';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.top = (100 + Math.random() * 20) + '%';
        dot.style.animationDuration = (12 + Math.random() * 18) + 's';
        dot.style.animationDelay = (Math.random() * 15) + 's';
        container.appendChild(dot);
      }
    }

    createAmbient();
    runSequence();
  </script>
</body>
</html>
